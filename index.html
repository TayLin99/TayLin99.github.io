<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇迹小树 - 捏人创作</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--accent:#e94560;
  --text:#eaeaea;--text2:#a0a0b8;--radius:12px;--transition:0.2s ease;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
}

/* ===== Header ===== */
.header{
  background:var(--surface);padding:10px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);flex-wrap:wrap;
}
.header .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#e94560,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header .title{font-size:15px;font-weight:500;white-space:nowrap;}
.header .author{font-size:12px;color:var(--text2);}
.header .spacer{flex:1;}
.header .btn-group{display:flex;gap:8px;}

/* ===== Buttons ===== */
.btn{
  padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;
  font-weight:600;transition:all var(--transition);display:flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#ff6b6b;transform:translateY(-1px);box-shadow:0 4px 12px rgba(233,69,96,0.4);}
.btn-outline{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.15);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn:disabled{opacity:0.5;pointer-events:none;}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;padding:10px 24px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;
  pointer-events:none;
}
.toast.show{opacity:1;}

/* ===== Main Layout ===== */
.main{
  display:flex;gap:20px;padding:16px;max-width:1200px;margin:0 auto;
  min-height:calc(100vh - 57px);align-items:flex-start;justify-content:center;
}

/* ===== Canvas Section ===== */
.canvas-section{flex-shrink:0;position:sticky;top:76px;}
.canvas-container{
  position:relative;width:min(540px,calc(100vw - 400px));aspect-ratio:1;
  background:var(--surface);border-radius:var(--radius);
  box-shadow:0 8px 40px rgba(0,0,0,0.4);overflow:hidden;
}
.canvas-container .layer-img{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:contain;pointer-events:none;transition:opacity 0.15s;
}
.canvas-container .layer-img.hidden{opacity:0;}
.export-status{
  text-align:center;font-size:11px;color:var(--text2);margin-top:8px;min-height:18px;
}
canvas#exportCanvas{display:none;}

/* ===== Parts Panel ===== */
.parts-panel{
  flex:1;min-width:280px;max-width:360px;display:flex;flex-direction:column;gap:6px;
  padding-bottom:40px;
}
.part-group{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid rgba(255,255,255,0.05);overflow:hidden;
  transition:all var(--transition);
}
.part-group.collapsed .part-body{display:none;}
.part-group:not(.collapsed){border-color:var(--accent);}
.part-header{
  padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;
  user-select:none;font-size:13px;font-weight:600;transition:background 0.15s;
}
.part-header:hover{background:rgba(255,255,255,0.03);}
.part-header .arrow{transition:transform 0.2s;font-size:10px;color:var(--text2);}
.part-group:not(.collapsed) .part-header .arrow{transform:rotate(90deg);}
.part-header .badge{
  margin-left:auto;font-size:11px;background:var(--card);padding:2px 10px;
  border-radius:20px;color:var(--text2);
}
.part-header .badge.has-selection{background:var(--accent);color:#fff;}
.part-body{
  padding:0 10px 10px;max-height:280px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--card) transparent;
}
.part-body .items-row{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));
  gap:7px;
}
.item-thumb{
  aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;background:var(--card);transition:all 0.15s;
  position:relative;
}
.item-thumb:hover{border-color:rgba(255,255,255,0.2);transform:scale(1.04);}
.item-thumb.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(233,69,96,0.3);}
.item-thumb img{width:100%;height:100%;object-fit:contain;}
.item-thumb .none-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:18px;font-weight:300;
}

/* ===== Responsive ===== */
@media(max-width:880px){
  .main{flex-direction:column;align-items:center;padding:12px;gap:14px;}
  .canvas-section{position:static;}
  .canvas-container{width:min(420px,92vw);}
  .parts-panel{width:100%;max-width:420px;}
}
@media(max-width:480px){
  .header{padding:8px 12px;gap:6px;}
  .header .title{font-size:13px;}
  .btn{padding:6px 10px;font-size:11px;}
  .canvas-container{width:92vw;}
  .parts-panel{max-width:100%;}
  .part-body .items-row{grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:5px;}
}
</style>

    img.style.zIndex = part.layerIndex;
    img.onload = () => {
      if (state[part.name] === ii) img.classList.remove('hidden');
    };
    canvasContainer.appendChild(img);
    layerEls[part.name][ii] = img;
  });
});

// ===== Build parts panel =====
const partsPanel = document.getElementById('partsPanel');

parts.forEach((part) => {
  const group = document.createElement('div');
  group.className = 'part-group collapsed';
  group.dataset.partName = part.name;

  // Header
  const header = document.createElement('div');
  header.className = 'part-header';
  const sel = state[part.name];
  const badgeText = sel >= 0 ? (sel + 1) + '/' + part.items.length : '无';
  header.innerHTML = '<span class="arrow">▶</span><span>' + part.displayName + '</span><span class="badge' + (sel >= 0 ? ' has-selection' : '') + '">' + badgeText + '</span>';
  header.onclick = () => togglePart(part.name);
  group.appendChild(header);

  // Body
  const body = document.createElement('div');
  body.className = 'part-body';
  const itemsRow = document.createElement('div');
  itemsRow.className = 'items-row';

  // "None" option for optional parts
  if (part.optional) {
    const noneThumb = document.createElement('div');
    noneThumb.className = 'item-thumb' + (sel === -1 ? ' selected' : '');
    noneThumb.innerHTML = '<div class="none-label">✕</div>';
    noneThumb.onclick = (e) => { e.stopPropagation(); selectItem(part.name, -1); };
    itemsRow.appendChild(noneThumb);
  }

  part.items.forEach((item, ii) => {
    const thumb = document.createElement('div');
    thumb.className = 'item-thumb' + (sel === ii ? ' selected' : '');
    const thumbImg = document.createElement('img');
    thumbImg.src = item.path;
    thumbImg.loading = 'lazy';
    thumb.appendChild(thumbImg);
    thumb.onclick = (e) => { e.stopPropagation(); selectItem(part.name, ii); };
    itemsRow.appendChild(thumb);
  });

  body.appendChild(itemsRow);
  group.appendChild(body);
  partsPanel.appendChild(group);
});

// ===== Accordion toggle (auto-collapse others only, no hiding) =====
function togglePart(partName) {
  if (expandedPart === partName) {
    // Collapse current → all show as collapsed headers
    expandedPart = null;
    partsPanel.querySelectorAll('.part-group').forEach(g => g.classList.add('collapsed'));
  } else {
    // Collapse previous, expand this one
    expandedPart = partName;
    partsPanel.querySelectorAll('.part-group').forEach(g => {
      g.classList.toggle('collapsed', g.dataset.partName !== partName);
    });
    const group = partsPanel.querySelector('[data-part-name="' + partName + '"]');
    if (group) group.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ===== Select item =====
function selectItem(partName, ii) {
  state[partName] = ii;

  // Update canvas
  const els = layerEls[partName];
  if (els) {
    els.forEach((img, idx) => img.classList.toggle('hidden', idx !== ii));
  }

  // Update panel UI
  refreshPartUI(partName);
}

// ===== Refresh part UI =====
function refreshPartUI(partName) {
  const part = parts.find(p => p.name === partName);
  if (!part) return;
  const group = partsPanel.querySelector('[data-part-name="' + partName + '"]');
  if (!group) return;

  const sel = state[partName];
  const badge = group.querySelector('.badge');
  badge.textContent = sel >= 0 ? (sel + 1) + '/' + part.items.length : '无';
  badge.classList.toggle('has-selection', sel >= 0);

  const thumbs = group.querySelectorAll('.item-thumb');
  thumbs.forEach((t, idx) => {
    if (part.optional) {
      t.classList.toggle('selected', idx === 0 ? sel === -1 : (idx - 1) === sel);
    } else {
      t.classList.toggle('selected', idx === sel);
    }
  });
}

// ===== Reset all =====
function resetAll() {
  parts.forEach(part => {
    const newVal = DEFAULT_NONE.includes(part.name) ? -1 : (part.items.length > 0 ? 0 : -1);
    state[part.name] = newVal;
    const els = layerEls[part.name];
    if (els) els.forEach((img, idx) => img.classList.toggle('hidden', idx !== newVal));
    refreshPartUI(part.name);
  });
  showToast('↺ 已重置');
}

// ===== Randomize =====
function randomize() {
  parts.forEach(part => {
    let newVal;
    if (DEFAULT_NONE.includes(part.name)) {
      // 部位14 always stays "none"
      newVal = -1;
    } else if (CAN_RANDOM_NONE.includes(part.name)) {
      // 配饰1/2/3, 鼻子装饰: 50% chance of "none"
      newVal = Math.random() < 0.4 ? -1 : Math.floor(Math.random() * part.items.length);
    } else if (part.optional) {
      // Other optional parts: always pick an item (never "none")
      newVal = Math.floor(Math.random() * part.items.length);
    } else {
      // Required parts: always pick an item
      newVal = Math.floor(Math.random() * part.items.length);
    }
    state[part.name] = newVal;
    const els = layerEls[part.name];
    if (els) els.forEach((img, idx) => img.classList.toggle('hidden', idx !== newVal));
    refreshPartUI(part.name);
  });
  showToast('🎲 随机搭配完成');
}

// ===== Export JPG (fetch+blobURL+Image avoids tainted canvas in file://) =====
async function exportJPG() {
  const statusEl = document.getElementById('exportStatus');
  const btnExport = document.getElementById('btnExport');
  btnExport.disabled = true;
  statusEl.textContent = '⏳ 正在合成...';

  const exportCanvas = document.getElementById('exportCanvas');
  const ctx = exportCanvas.getContext('2d');
  ctx.clearRect(0, 0, 2048, 2048);

  try {
    // Collect layers (bottom to top = LAYER_ORDER)
    const layers = [];
    for (const name of LAYER_ORDER) {
      const selIdx = state[name];
      if (selIdx < 0) continue;
      const part = parts.find(p => p.name === name);
      if (!part) continue;
      layers.push(part.items[selIdx].path);
    }

    // fetch each image as blob, load via blob: URL (does NOT taint canvas)
    for (const src of layers) {
      const img = await loadCleanImage(src);
      ctx.drawImage(img, 0, 0, 2048, 2048);
    }

    // Canvas is clean → export
    const isWeChat = /MicroMessenger/i.test(navigator.userAgent);

    if (isWeChat) {
      // WeChat: open image in new tab for long-press save
      const dataUrl = exportCanvas.toDataURL('image/jpeg', 0.92);
      var w = window.open('');
      if (w) {
        w.document.write('<title>长按保存图片</title><img src="' + dataUrl + '" style="width:100%;display:block"/>');
        statusEl.textContent = '✅ 已打开图片，长按即可保存';
      } else {
        statusEl.textContent = '❌ 弹窗被拦截，请允许弹窗后重试';
      }
      btnExport.disabled = false;
    } else {
      // Normal browser: trigger download
      exportCanvas.toBlob((blob) => {
        if (blob) {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = '奇迹小树_' + Date.now() + '.jpg';
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          statusEl.textContent = '✅ 导出成功！';
        } else {
          statusEl.textContent = '❌ 导出失败，请重试';
        }
        btnExport.disabled = false;
      }, 'image/jpeg', 0.92);
    }
  } catch (err) {
    statusEl.textContent = '❌ 导出失败: ' + err.message;
    btnExport.disabled = false;
  }
}

// Load image via XHR+blob URL to avoid tainted canvas (fetch blocked in file://)
function loadCleanImage(src) {
  return new Promise((resolve, reject) => {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', src, true);
    xhr.responseType = 'blob';
    xhr.onload = function() {
      // file:// returns status 0 on success
      if (xhr.status === 200 || xhr.status === 0) {
        var objectUrl = URL.createObjectURL(xhr.response);
        var img = new Image();
        img.onload = function() { resolve(img); };
        img.onerror = function() { reject(new Error('图片解码失败')); };
        img.src = objectUrl;
      } else {
        reject(new Error('XHR status ' + xhr.status));
      }
    };
    xhr.onerror = function() { reject(new Error('XHR 请求失败')); };
    xhr.send();
  });
}

// ===== Toast =====
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== Init: expand the first part (背景) =====
if (parts.length > 0) {
  togglePart(parts[0].name);
}
</script>
